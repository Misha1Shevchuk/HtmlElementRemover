<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Element Remover</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <h1>Element Hider</h1>
    <p class="domain" id="domain">Loading...</p>
  </div>

  <div class="selector-list" id="selector-list">
    <!-- Rendered by popup.js -->
  </div>

  <div class="list-footer" id="list-footer">
    <button id="btn-add-new" class="btn-add-new">+ Hide Element</button>
    <button id="btn-copy-from" class="btn-copy-from">Copy from…</button>
  </div>

  <div class="add-form" id="add-form" style="display:none">
    <h2 id="form-title">Hide Element</h2>

    <div class="form-group">
      <label for="input-description">Description <span class="required">*</span></label>
      <input type="text" id="input-description" placeholder="e.g. Promoted tweets" maxlength="100" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="input-selector">CSS Selector <span class="required">*</span></label>
      <input type="text" id="input-selector" placeholder="e.g. .promoted-tweet" autocomplete="off" spellcheck="false">
    </div>

    <div class="form-error" id="form-error"></div>

    <div class="form-actions">
      <button id="btn-cancel" class="btn-secondary">Cancel</button>
      <button id="btn-preview" class="btn-secondary">Preview</button>
      <button id="btn-save" class="btn-primary">Save</button>
    </div>
  </div>

  <div class="copy-panel" id="copy-panel" style="display:none">
    <h2>Copy from Domain</h2>

    <div class="form-group">
      <label for="copy-domain-select">Source domain</label>
      <select id="copy-domain-select"></select>
    </div>

    <div id="copy-selector-list" class="copy-selector-list"></div>

    <div class="form-error" id="copy-error"></div>

    <div class="form-actions">
      <button id="btn-copy-cancel" class="btn-secondary">Cancel</button>
      <button id="btn-copy-confirm" class="btn-primary" disabled>Copy Selected</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
